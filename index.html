<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Microsoft YaHei', sans-serif;
    color: #eee;
    flex-direction: column;
    gap: 16px;
  }
  h1 {
    font-size: 28px;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff8855;
  }
  .info {
    display: flex;
    gap: 30px;
    font-size: 18px;
  }
  .info span { color: #aaa; }
  .info .val { color: #00ff88; font-weight: bold; }
  canvas {
    border: 2px solid #00ff88;
    border-radius: 4px;
    box-shadow: 0 0 20px #00ff8833;
    background: #16213e;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .controls button {
    padding: 10px 24px;
    font-size: 16px;
    border: 1px solid #00ff88;
    background: transparent;
    color: #00ff88;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls button:hover {
    background: #00ff88;
    color: #1a1a2e;
  }
  .overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    pointer-events: none;
  }
  .overlay.active { pointer-events: auto; }
  .overlay .msg {
    font-size: 32px;
    color: #ff4444;
    text-shadow: 0 0 10px #ff444466;
    display: none;
  }
  .overlay.active .msg { display: block; }
  .tip {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
  }
  /* 手机方向键 */
  .dpad {
    display: none;
    grid-template-areas:
      ". up ."
      "left . right"
      ". down .";
    gap: 6px;
    margin-top: 12px;
  }
  .dpad button {
    width: 60px;
    height: 60px;
    font-size: 24px;
    border: 1px solid #00ff88;
    background: #16213e;
    color: #00ff88;
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad button:active { background: #00ff88; color: #1a1a2e; }
  .dpad .up { grid-area: up; }
  .dpad .down { grid-area: down; }
  .dpad .left { grid-area: left; }
  .dpad .right { grid-area: right; }

  @media (max-width: 600px) {
    .dpad { display: grid; }
  }
</style>
</head>
<body>

<h1>🐍 贪吃蛇</h1>
<div class="info">
  <div><span>分数：</span><span class="val" id="score">0</span></div>
  <div><span>最高：</span><span class="val" id="best">0</span></div>
</div>

<div style="position:relative">
  <canvas id="game" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <div class="msg" id="msg">游戏结束!</div>
  </div>
</div>

<div class="controls">
  <button onclick="startGame()">开始 / 重新开始</button>
</div>

<div class="tip">方向键 / WASD 控制方向 · 空格暂停</div>

<div class="dpad">
  <button class="up" onclick="setDir(0,-1)">▲</button>
  <button class="left" onclick="setDir(-1,0)">◀</button>
  <button class="right" onclick="setDir(1,0)">▶</button>
  <button class="down" onclick="setDir(0,1)">▼</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, best = 0, running, paused, timer;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  paused = false;
  document.getElementById('score').textContent = 0;
  document.getElementById('overlay').classList.remove('active');
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function setDir(dx, dy) {
  // 不允许180度掉头
  if (dir.x + dx === 0 && dir.y + dy === 0) return;
  nextDir = {x:dx, y:dy};
}

function update() {
  if (paused) return;
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // 撞墙或撞自己 → 游戏结束
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // 背景
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格线（淡）
  ctx.strokeStyle = '#1a2540';
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,canvas.height); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0,i*GRID); ctx.lineTo(canvas.width,i*GRID); ctx.stroke();
  }

  // 食物
  ctx.fillStyle = '#ff4444';
  ctx.shadowColor = '#ff444488';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x*GRID+GRID/2, food.y*GRID+GRID/2, GRID/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇身
  snake.forEach((s, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(180 + 75 * ratio);
    ctx.fillStyle = i === 0 ? '#00ff88' : `rgb(0,${g},80)`;
    ctx.shadowColor = i === 0 ? '#00ff8866' : 'transparent';
    ctx.shadowBlur = i === 0 ? 6 : 0;
    ctx.fillRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2);
    ctx.shadowBlur = 0;
  });

  // 暂停提示
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 28px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText('暂停中', canvas.width/2, canvas.height/2);
    ctx.textAlign = 'start';
  }
}

function gameOver() {
  clearInterval(timer);
  running = false;
  if (score > best) {
    best = score;
    document.getElementById('best').textContent = best;
  }
  document.getElementById('msg').style.display = 'block';
  document.getElementById('overlay').classList.add('active');

  // 闪烁蛇身
  let blink = 0;
  const blinkTimer = setInterval(() => {
    blink++;
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (blink % 2 === 0) {
      snake.forEach(s => {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2);
      });
    }
    if (blink > 5) clearInterval(blinkTimer);
  }, 150);
}

function startGame() {
  if (timer) clearInterval(timer);
  init();
  draw();
  running = true;
  timer = setInterval(update, 120);
}

// 键盘控制
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDir(0,-1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDir(0,1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDir(-1,0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDir(1,0); break;
    case ' ':
      e.preventDefault();
      if (!running) { startGame(); return; }
      paused = !paused;
      if (paused) draw();
      break;
  }
});

// 初始化画面
init();
draw();
</script>
</body>
</html>
